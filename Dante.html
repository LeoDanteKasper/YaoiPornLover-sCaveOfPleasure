<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE NEXUS - DEVIL MAY CRY: DANTE ZONE</title>
    <style>
        /* ==========================================================================
           CORE DESIGN SYSTEM (DEVIL MAY CRY - NEOGOTHIC INDUSTRIAL)
           ========================================================================== */
        :root {
            --dmc-red: #bb0a1e;
            --dmc-crimson: #ff002b;
            --dmc-glow: rgba(255, 0, 43, 0.4);
            --bg-gothic: #030305;
            --panel-ebony: rgba(10, 10, 14, 0.9);
            --font-gothic: 'Cinzel', 'Georgia', serif;
            --font-hud: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-gothic);
            color: #ffffff;
            font-family: var(--font-gothic);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Textura de fondo gótica con degradado de azufre profundo */
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95)),
                radial-gradient(circle at 50% 30%, rgba(187, 10, 30, 0.15) 0%, transparent 70%);
            background-attachment: fixed;
        }

        /* ==========================================================================
           STYLISH HUD HEADER
           ========================================================================== */
        .dmc-header {
            text-align: center;
            margin: 30px 0;
            position: relative;
            z-index: 10;
        }

        .dmc-header h1 {
            font-size: 3rem;
            text-transform: uppercase;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 6px;
            text-shadow: 0 0 15px var(--dmc-crimson), 2px 2px 0 #000;
        }

        .dmc-sub {
            font-family: var(--font-hud);
            font-size: 0.8rem;
            color: #8a8a95;
            letter-spacing: 3px;
            margin-top: 8px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .dmc-sub span {
            color: var(--dmc-crimson);
            font-weight: bold;
        }

        /* ==========================================================================
           THE DEMONIC CABINET (CONTENEDOR DEL JUEGO)
           ========================================================================== */
        .gothic-cabinet {
            background: #000000;
            width: 100%;
            max-width: 850px;
            height: 620px;
            border: 2px solid #1a1a24;
            position: relative;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            margin-bottom: 25px;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Efecto de marco iluminado con el poder de Rebellion */
        .gothic-cabinet::before {
            content: '';
            position: absolute;
            top: -3px; left: -3px; right: -3px; bottom: -3px;
            background: linear-gradient(45deg, var(--dmc-red), #300005, var(--dmc-crimson), #000);
            z-index: -1;
            border-radius: 6px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .gothic-cabinet:hover::before {
            opacity: 1;
            filter: drop-shadow(0 0 15px var(--dmc-crimson));
        }

        #dante-emulator-container {
            width: 100%;
            height: 100%;
            background: #000;
        }

        /* Overlay estilizado de carga gótica */
        #loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050508;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .rank-s {
            font-size: 5rem;
            font-weight: 900;
            color: var(--dmc-crimson);
            text-shadow: 0 0 30px var(--dmc-crimson);
            font-style: italic;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* ==========================================================================
           CONTROLES HUD / INTERFAZ DE SALIDA
           ========================================================================== */
        .dmc-actions {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .dmc-btn {
            background: var(--panel-ebony);
            border: 1px solid var(--dmc-red);
            color: #d1d1d6;
            padding: 12px 30px;
            font-family: var(--font-gothic);
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .dmc-btn:hover {
            color: #ffffff;
            background: var(--dmc-red);
            border-color: var(--dmc-crimson);
            box-shadow: 0 0 20px var(--dmc-glow);
            transform: scale(1.05);
        }

        .dmc-btn-secondary {
            border-color: #3a3a4a;
            color: #7a7a85;
        }

        .dmc-btn-secondary:hover {
            background: #1c1c24;
            color: #fff;
            box-shadow: none;
        }
    </style>

    <!-- CDN DE CONFIANZA DE RUFFLE -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ruffle/0.1.0.1065/ruffle.js"></script>
</head>
<body>

    <header class="dmc-header">
        <h1>Let's Rock!</h1>
        <div class="dmc-sub">
            MISSION: <span>EL_DIENTE.SWF</span> // STYLE RANK: <span style="text-shadow: 0 0 5px var(--dmc-crimson);">SSSR</span>
        </div>
    </header>

    <div class="gothic-cabinet">
        <div id="loading-overlay">
            <div class="rank-s">S</div>
            <p style="font-family: var(--font-hud); font-size: 0.75rem; color: #5a5a65; letter-spacing: 4px; margin-top: 15px;">LOADING DEVIL ARMS...</p>
        </div>

        <div id="dante-emulator-container"></div>
    </div>

    <div class="dmc-actions">
        <button class="dmc-btn" onclick="toggleFullscreen()">Fullscreen</button>
        <button class="dmc-btn dmc-btn-secondary" onclick="window.history.back()">Leave Mission</button>
    </div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("dante-emulator-container");
            container.appendChild(player);
            
            // Carga optimizada apuntando al archivo exacto indicado por el usuario
            player.load({
                url: "juegos/El_Diente.swf", 
                letterbox: "on",
                backgroundColor: "#000000",
                autoplay: "on",
                unmuteOverlay: "hidden"
            }).then(() => {
                setTimeout(() => {
                    const overlay = document.getElementById("loading-overlay");
                    if (overlay) {
                        overlay.style.opacity = "0";
                        setTimeout(() => overlay.remove(), 500);
                    }
                }, 600);
                console.log("Devil May Cry Engine: Ruffle y El_Diente.swf cargados con éxito.");
            }).catch((err) => {
                console.error("Fallo crítico al inicializar el SWF:", err);
            });
        });

        function toggleFullscreen() {
            const emu = document.getElementById("dante-emulator-container");
            if (emu.requestFullscreen) {
                emu.requestFullscreen();
            } else if (emu.webkitRequestFullscreen) {
                emu.webkitRequestFullscreen();
            }
        }
    </script>
</body>
</html>
